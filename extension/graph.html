<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱 — 个人知识库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; overflow: hidden; }

#toolbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 10px 20px; background: rgba(13,17,23,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
#toolbar h1 { font-size: 16px; font-weight: 600; color: #58a6ff; white-space: nowrap; }
#toolbar h1 span { font-size: 12px; color: #8b949e; font-weight: 400; margin-left: 6px; }
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { font-size: 12px; color: #8b949e; white-space: nowrap; }
.filter-group select, .filter-group input { padding: 4px 8px; border: 1px solid #30363d; border-radius: 6px; font-size: 12px; background: #161b22; color: #c9d1d9; outline: none; }
.filter-group select:focus, .filter-group input:focus { border-color: #58a6ff; }
.filter-group input { width: 140px; }
#btn-back { padding: 4px 12px; border: 1px solid #30363d; border-radius: 6px; font-size: 12px; cursor: pointer; background: #161b22; color: #c9d1d9; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
#btn-back:hover { border-color: #58a6ff; color: #58a6ff; }
.stats-bar { margin-left: auto; font-size: 11px; color: #8b949e; display: flex; gap: 12px; }
.stats-bar .stat { display: flex; align-items: center; gap: 4px; }
.stats-bar .stat-num { font-weight: 700; color: #58a6ff; }

#graph-container { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }
svg { width: 100%; height: 100%; }

/* 节点样式 */
.node circle { stroke: #0d1117; stroke-width: 1.5px; cursor: pointer; transition: opacity 0.2s; }
.node text { font-size: 10px; fill: #c9d1d9; pointer-events: none; text-anchor: middle; dominant-baseline: middle; }
.node:hover circle { stroke: #58a6ff; stroke-width: 2.5px; }
.link { stroke-opacity: 0.15; }
.link.highlighted { stroke-opacity: 0.6; }
.node.dimmed circle { opacity: 0.15; }
.node.dimmed text { opacity: 0.1; }
.link.dimmed { stroke-opacity: 0.03; }

/* Tooltip */
#tooltip { position: fixed; pointer-events: none; background: rgba(22,27,34,0.95); border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 12px; max-width: 280px; z-index: 200; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
#tooltip .tt-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #f0f6fc; }
#tooltip .tt-meta { color: #8b949e; font-size: 11px; margin-bottom: 4px; }
#tooltip .tt-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
#tooltip .tt-tag { padding: 1px 5px; background: #1e2a40; border-radius: 8px; font-size: 10px; color: #79c0ff; }

/* 图例 */
#legend { position: fixed; bottom: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 11px; max-height: 200px; overflow-y: auto; z-index: 100; }
#legend h4 { font-size: 11px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; }
.legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; cursor: pointer; }
.legend-item:hover { color: #f0f6fc; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* 加载状态 */
#loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 16px; color: #8b949e; }
#loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="toolbar">
  <a id="btn-back" href="kb-page.html">← 返回</a>
  <h1>🕸️ 知识图谱 <span id="stats-text"></span></h1>
  <div class="filter-group">
    <label>分类:</label>
    <select id="filter-cat"><option value="">全部</option></select>
  </div>
  <div class="filter-group">
    <label>搜索:</label>
    <input type="text" id="filter-search" placeholder="按标签搜索...">
  </div>
  <div class="stats-bar">
    <div class="stat">节点 <span class="stat-num" id="stat-nodes">0</span></div>
    <div class="stat">连线 <span class="stat-num" id="stat-edges">0</span></div>
  </div>
</div>

<div id="graph-container">
  <svg id="graph-svg"></svg>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-meta"></div>
  <div class="tt-tags"></div>
</div>

<div id="legend"></div>

<div id="loading"><span class="spinner"></span>正在构建知识图谱...</div>

<script src="lib/d3.min.js"></script>
<script src="graph.js"></script>
</body>
</html>
