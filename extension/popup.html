<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f8f9fa; }
.header { background: linear-gradient(135deg, #3366cc, #2a55b8); color: white; padding: 18px 20px; }
.header h1 { font-size: 17px; font-weight: 600; }
.header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 3px; }
.content { padding: 18px 20px; }
.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; margin-bottom: 8px; }
.btn-primary { background: #3366cc; color: white; }
.btn-primary:hover:not(:disabled) { background: #2a55b8; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(51,102,204,0.3); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary { background: #e8eef5; color: #3366cc; }
.btn-secondary:hover { background: #d4e1f0; }
.btn-sync { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.btn-sync:hover:not(:disabled) { background: #c8e6c9; }
.btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
.status { margin-top: 6px; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; display: none; }
.status.success { background: #e8f5e9; color: #1b5e20; display: block; }
.status.error { background: #ffebee; color: #b71c1c; display: block; }
.status.loading { background: #e3f2fd; color: #0d47a1; display: block; }
.status .article-title { font-weight: 600; margin-top: 4px; }
.status .meta-line { font-size: 12px; color: #666; margin-top: 4px; }
.tags { margin-top: 6px; }
.tag { display: inline-block; padding: 2px 8px; background: #e8eef5; border-radius: 10px; margin: 2px; font-size: 11px; color: #3366cc; }
.stats-bar { display: flex; justify-content: center; gap: 16px; margin: 12px 0; padding: 10px; background: #f0f0f0; border-radius: 8px; }
.stat-item { text-align: center; }
.stat-num { font-size: 20px; font-weight: 700; color: #3366cc; }
.stat-label { font-size: 11px; color: #888; }
.divider { height: 1px; background: #e0e0e0; margin: 8px 0; }
.shortcut-hint { font-size: 11px; color: #aaa; text-align: center; }
kbd { background: #eee; border: 1px solid #ccc; border-radius: 3px; padding: 1px 4px; font-size: 10px; }
.sync-row { display: flex; gap: 8px; margin-bottom: 8px; }
.sync-row .btn { margin-bottom: 0; }
.sync-status-line { font-size: 11px; color: #888; text-align: center; margin-top: 4px; }
.sync-status-line a { color: #3366cc; text-decoration: none; }
.sync-status-line .sync-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.sync-dot.configured { background: #4caf50; }
.sync-dot.not-configured { background: #ffa726; }
</style>
</head>
<body>
<div class="header">
  <h1>📚 知识库助手</h1>
  <div class="subtitle">一键保存网页 · 无需服务器</div>
</div>
<div class="content">
  <button class="btn btn-primary" id="addBtn">📖 加入知识库</button>
  <div class="status" id="status"></div>
  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><div class="stat-num" id="statArticles">0</div><div class="stat-label">文章</div></div>
    <div class="stat-item"><div class="stat-num" id="statCats">0</div><div class="stat-label">分类</div></div>
    <div class="stat-item"><div class="stat-num" id="statTags">0</div><div class="stat-label">标签</div></div>
  </div>
  <div class="divider"></div>
  <button class="btn btn-secondary" id="viewBtn">👁️ 查看知识库</button>
  <button class="btn btn-secondary" id="rebuildBtn">🔄 重建知识库</button>
  <div class="divider"></div>
  <div class="sync-row">
    <button class="btn btn-sync" id="syncPushBtn" style="flex:1;">☁️ 同步</button>
    <button class="btn btn-sync" id="syncPullBtn" style="flex:1;">☁️ 恢复</button>
  </div>
  <div class="sync-status-line" id="syncStatusLine">
    <span class="sync-dot not-configured"></span><span id="syncStatusText">未配置云端同步</span>
  </div>
  <div class="divider"></div>
  <div class="shortcut-hint">快捷键: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>K</kbd> 加入 · 右键菜单也可加入</div>
</div>
<script src="lib/turndown.js"></script>
<script src="lib/kb-engine.js"></script>
<script src="popup.js"></script>
</body>
</html>
